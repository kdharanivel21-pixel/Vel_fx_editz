/* BACKGROUND */

left:0;

}

@keyframes bgMove{
0%{
transform:translate(0,0);
}
100%{
transform:translate(-120px,-120px);
}
}

/* HEADER */

header{

0 0 40px #ff00ff;

@keyframes float{
0%{
transform:translateY(0);
}
50%{
transform:translateY(-10px);
}
100%{
transform:translateY(0);
}
}

header h1{
font-size:48px;
margin-top:20px;

header p{
margin-top:10px;

margin-bottom:25px;

display:inline-block;
padding:14px 32px;
background:#0095f6;
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
border-radius:14px;
box-shadow:
0 0 15px #0095f6,
0 0 30px #0095f688;
transition:0.3s;
animation:pulse 2s infinite;
}

.follow-btn:hover{
transform:scale(1.08);
background:#1877f2;

@keyframes pulse{
0%{
transform:scale(1);

50%{
transform:scale(1.05);

100%{

.search-box{
display:flex;
justify-content:center;
margin:40px 20px;
}

.search-box input{
width:300px;
padding:15px;
border:none;
outline:none;
font-size:18px;
border-radius:12px 0 0 12px;
background:#111;
color:white;
}

.search-box button{
padding:15px 25px;
border:none;
background:#00ffff;
color:black;
font-size:18px;
font-weight:bold;

border-radius:0 12px 12px 0;

.search-box button:hover{

text-align:center;
font-size:40px;
margin-top:50px;
margin-bottom:30px;
color:#00ffff;
text-shadow:0 0 20px #00ffff;

.card-area{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:20px;
}

.card{
width:320px;
background:#111;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 25px #00ffff;
transition:0.4s;
animation:fadeUp 1s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 0 35px #ff00ff;
}

/* IMAGE */

.card img{
width:100%;
height:350px;
object-fit:cover;
border-bottom:3px solid #00ffff;
}

/* CONTENT */

.card-content{
padding:20px;
text-align:center;
}

.card-content h2{
font-size:28px;
color:#00ffff;
margin-bottom:10px;

.card-content p{
font-size:18px;
color:#ccc;
margin-bottom:20px;

background:#ff00ff;
color:white;
text-decoration:none;
border-radius:12px;
font-weight:bold;

box-shadow:0 0 20px #ff00ff;
}

.open-btn:hover{
transform:scale(1.1);
background:#00ffff;
color:black;
}

.copy-btn{
padding:14px 25px;
border:none;
background:linear-gradient(45deg,#00ffff,#ff00ff);
color:white;
font-size:16px;
font-weight:bold;
border-radius:12px;
cursor:pointer;
transition:0.3s;
box-shadow:
0 0 15px #00ffff,
0 0 25px #ff00ff;
}

.copy-btn:hover{
transform:scale(1.1);

height:140px;
background:#000;
color:#00ffff;
border:2px solid #00ffff;
border-radius:15px;
padding:15px;
font-size:15px;
margin-bottom:20px;

.search-box input{

/* =================================================== */
/* 2. ENGINE LOGIC (STREAMLINED FOR EASIER UPGRADES)   */
/* =================================================== */

/* --- UNIVERSAL PROJECT VIDEO RENDERER --- */
function displayVideos(list){
const results = document.getElementById("videoResults");
results.innerHTML = "";
list.forEach(video => {
results.innerHTML += `
<div class="card">
<img src="${video.thumbnail}">
<div class="card-content">
<h2>${video.code}</h2>
<p>${video.title}</p>
<a class="open-btn" href="${video.link}" target="_blank">OPEN PROJECT</a>
</div>
</div>
`;
});
}

/* --- UNIVERSAL PROMPT CARD RENDERER --- */
function displayPrompts(list, targetElementId){
const results = document.getElementById(targetElementId);
results.innerHTML = "";
list.forEach(prompt => {
results.innerHTML += `
<div class="card">
<img src="${prompt.thumbnail}">
<div class="card-content">
<h2>${prompt.code}</h2>
<p>${prompt.title}</p>
<textarea id="${prompt.code}" class="prompt-box" readonly>${prompt.prompt}</textarea>
<button class="copy-btn" onclick="copyPrompt('${prompt.code}')">COPY PROMPT</button>
</div>
</div>
`;
});
}

/* --- MASTER TRIGGER TO FILL SECTIONS --- */
function refreshAllSections(videoSrc, bothSrc, boySrc, girlSrc) {
displayVideos(videoSrc);
displayPrompts(bothSrc, "bothPromptResults");
displayPrompts(boySrc, "boyPromptResults");
displayPrompts(girlSrc, "girlPromptResults");
}

/* --- SEARCH FILTER LOGIC --- */
function searchItems(){
let input = document.getElementById("searchInput").value.toUpperCase();

if(input === ""){
refreshAllSections(videos, bothPrompts, boyPrompts, girlPrompts);
return;
}

const filteredVideos = videos.filter(v => v.code.toUpperCase().includes(input) || v.title.toUpperCase().includes(input));
const filteredBoth = bothPrompts.filter(p => p.code.toUpperCase().includes(input) || p.title.toUpperCase().includes(input));
const filteredBoys = boyPrompts.filter(p => p.code.toUpperCase().includes(input) || p.title.toUpperCase().includes(input));
const filteredGirls = girlPrompts.filter(p => p.code.toUpperCase().includes(input) || p.title.toUpperCase().includes(input));

refreshAllSections(filteredVideos, filteredBoth, filteredBoys, filteredGirls);
}

/* --- COPY FUNCTIONALITY --- */
function copyPrompt(id){
const text = document.getElementById(id);
navigator.clipboard.writeText(text.value);
alert("Prompt Copied!");
}

/* --- INITIAL RUNTIME --- */
refreshAllSections(videos, bothPrompts, boyPrompts, girlPrompts);
