padding:0;

body{
background:#000;

}

/* BACKGROUND */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:200%;
height:200%;
background:
radial-gradient(circle,#00ffff22 10%,transparent 10%),
radial-gradient(circle,#ff00ff22 10%,transparent 10%);
background-size:120px 120px;
animation:bgMove 10s linear infinite;
z-index:-1;
}

@keyframes bgMove{
0%{
transform:translate(0,0);
}
100%{
transform:translate(-120px,-120px);
}
}

/* HEADER */

header{
padding:40px 20px;
text-align:center;
background:linear-gradient(45deg,#ff00ff,#00ffff);
box-shadow:0 0 25px #00ffff;
}

padding:5px;
background:#000;

0 0 20px #00ffff,
0 0 40px #ff00ff;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{
transform:translateY(0);
}
50%{
transform:translateY(-10px);
}
100%{
transform:translateY(0);
}
}

header h1{
font-size:48px;
margin-top:20px;
text-shadow:0 0 20px cyan;
}

header p{

margin-bottom:25px;

padding:14px 32px;
background:#0095f6;
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
border-radius:14px;
box-shadow:
0 0 15px #0095f6,
0 0 30px #0095f688;
transition:0.3s;
animation:pulse 2s infinite;
}

.follow-btn:hover{
transform:scale(1.08);
background:#1877f2;
}

@keyframes pulse{
0%{
transform:scale(1);
}
50%{
transform:scale(1.05);
}
100%{
transform:scale(1);
}

display:flex;
justify-content:center;
margin:40px 20px;
}

.search-box input{
width:300px;
padding:15px;
border:none;
outline:none;

border-radius:12px 0 0 12px;
background:#111;
color:white;
}

.search-box button{
padding:15px 25px;

background:#00ffff;
color:black;
font-size:18px;
font-weight:bold;

border-radius:0 12px 12px 0;

.search-box button:hover{

margin-top:50px;

.card-area{

justify-content:center;
gap:30px;
padding:20px;

.card{
width:320px;
background:#111;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 25px #00ffff;
transition:0.4s;
animation:fadeUp 1s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 0 35px #ff00ff;
}

.card img{
width:100%;
height:350px;
object-fit:cover;

0 0 15px #00ffff,

/* --- UNIVERSAL PROJECT VIDEO RENDERER --- */
function displayVideos(list){
const results = document.getElementById("videoResults");
results.innerHTML = "";
list.forEach(video => {
results.innerHTML += `
<div class="card">
<img src="${video.thumbnail}">
<div class="card-content">
<h2>${video.code}</h2>
<p>${video.title}</p>
<a class="open-btn" href="${video.link}" target="_blank">OPEN PROJECT</a>
</div>
</div>
`;
});
}

/* --- UNIVERSAL PROMPT CARD RENDERER --- */
function displayPrompts(list, targetElementId){
const results = document.getElementById(targetElementId);
results.innerHTML = "";
list.forEach(prompt => {
results.innerHTML += `
<div class="card">
<img src="${prompt.thumbnail}">
<div class="card-content">
<h2>${prompt.code}</h2>
<p>${prompt.title}</p>
<textarea id="${prompt.code}" class="prompt-box" readonly>${prompt.prompt}</textarea>
<button class="copy-btn" onclick="copyPrompt('${prompt.code}')">COPY PROMPT</button>
</div>
</div>
`;
});
}

/* --- MASTER TRIGGER TO FILL SECTIONS --- */
function refreshAllSections(videoSrc, bothSrc, boySrc, girlSrc) {
displayVideos(videoSrc);
displayPrompts(bothSrc, "bothPromptResults");
displayPrompts(boySrc, "boyPromptResults");
displayPrompts(girlSrc, "girlPromptResults");
}

/* --- SEARCH FILTER LOGIC --- */
function searchItems(){
let input = document.getElementById("searchInput").value.toUpperCase();

if(input === ""){
refreshAllSections(videos, bothPrompts, boyPrompts, girlPrompts);
return;
}

const filteredVideos = videos.filter(v => v.code.toUpperCase().includes(input) || v.title.toUpperCase().includes(input));
const filteredBoth = bothPrompts.filter(p => p.code.toUpperCase().includes(input) || p.title.toUpperCase().includes(input));
const filteredBoys = boyPrompts.filter(p => p.code.toUpperCase().includes(input) || p.title.toUpperCase().includes(input));
const filteredGirls = girlPrompts.filter(p => p.code.toUpperCase().includes(input) || p.title.toUpperCase().includes(input));

refreshAllSections(filteredVideos, filteredBoth, filteredBoys, filteredGirls);
}

/* --- COPY FUNCTIONALITY --- */

const text = document.getElementById(id);
navigator.clipboard.writeText(text.value);

}
